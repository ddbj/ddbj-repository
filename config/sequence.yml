shared:
  jpo_na:
    <% ('QP'..'QU').without('QR').each do |prefix| %>
    - prefix: '<%= prefix %>'
      digits: 6
    <% end %>

  jpo_aa:
    <% ('ZAA'..'ZZZ').each do |prefix| %>
    - prefix: '<%= prefix %>'
      digits: 7
    <% end %>

  bp:
    - prefix: 'PRJDB'
      digits: 9
      pad:    false

  bs:
    - prefix: 'SAMD'
      digits: 8
